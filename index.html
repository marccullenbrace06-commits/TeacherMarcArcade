<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-pink: #ff007a;
            --neon-purple: #6200ea;
            --neon-green: #00c853;
            --accent-yellow: #ffd600;
            --text-dark: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: url('arcadebg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-dark); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        body.active-arcade {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('arcadebg.png');
            background-size: cover;
            background-position: center;
        }

        /* --- Utility Controls --- */
        .controls-dock {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 2000;
        }

        .control-btn {
            background: white;
            border: 3px solid var(--text-dark);
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 4px 0 var(--text-dark);
            transition: 0.1s;
        }

        .control-btn:hover { transform: scale(1.1); background: var(--accent-yellow); }
        .control-btn:active { transform: translateY(4px); box-shadow: none; }

        /* --- Social Sidebar --- */
        .social-sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .social-sidebar a {
            color: white;
            font-size: 24px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #000;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-sidebar a:hover {
            transform: scale(1.2) translateX(5px);
            box-shadow: 6px 6px 15px rgba(0,0,0,0.3), 2px 2px 0 #000;
            filter: brightness(1.2);
        }

        .fa-facebook { background: #1877F2; }
        .fa-youtube { background: #FF0000; }
        .fa-tiktok { background: #000; }

        /* --- UI Components --- */
        .btn-start {
            font-family: 'Press Start 2P', cursive;
            padding: 25px 50px;
            font-size: 1.4rem;
            background: var(--accent-yellow);
            color: var(--text-dark);
            border: 6px solid var(--text-dark);
            cursor: pointer;
            box-shadow: 0 10px 0 var(--text-dark);
            animation: arcadePulse 1.2s infinite;
        }

        @keyframes arcadePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); filter: brightness(1.1); }
            100% { transform: scale(1); }
        }

        .container { 
            max-width: 600px; 
            width: 90%;
            display: none; 
            z-index: 600;
            animation: bounceUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .arcade-card { 
            background: rgba(255, 255, 255, 0.98); 
            border: 6px solid var(--text-dark);
            border-radius: 40px; 
            padding: 30px; 
            box-shadow: 0 15px 0px var(--text-dark);
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
        }

        .game-item, .btn {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 4px solid var(--text-dark);
            position: relative;
        }

        .game-item:hover, .btn:hover {
            transform: scale(1.03) translateY(-5px);
            background: #ffffff !important;
            color: var(--text-dark) !important;
            border-color: var(--neon-purple);
            box-shadow: 0 12px 20px rgba(98, 0, 234, 0.3), 0 8px 0 var(--neon-purple);
        }

        .game-item:hover span, .game-item:hover i { color: var(--neon-purple) !important; }

        .game-item {
            background: var(--accent-yellow);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 0 var(--text-dark);
        }

        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 20px; 
            font-weight: 800; 
            text-transform: uppercase; 
            display: block; 
            text-decoration: none; 
        }

        .btn-primary { background: var(--neon-green); color: white; box-shadow: 0 6px 0 #007e33; }
        .btn-secondary { background: var(--neon-pink); color: white; box-shadow: 0 6px 0 #b00055; margin-top: 10px; }

        .game-item:active, .btn:active { transform: translateY(4px) scale(0.98); box-shadow: none !important; }

        #gate-description {
            font-weight: 600;
            color: #444;
            margin-bottom: 15px;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .bullet-list { text-align: left; margin: 15px 0; list-style: none; padding: 0; }
        .bullet-list li { font-size: 0.85rem; margin-bottom: 8px; padding-left: 25px; position: relative; font-weight: 600; line-height: 1.4; }
        .bullet-list li::before { content: "⭐"; position: absolute; left: 0; }

        .pass-box { background: #f4f4f4; padding: 20px; border-radius: 20px; border: 4px dashed var(--neon-purple); }
        input[type="password"] { width: 100%; padding: 12px; border-radius: 12px; border: 3px solid #000; margin-bottom: 12px; text-align: center; font-weight: 800; }

        .note { font-size: 0.75rem; margin-top: 8px; color: #666; font-style: italic; }
        .hidden { display: none; }

        @media (max-width: 768px) {
            .social-sidebar { position: fixed; bottom: 15px; top: auto; flex-direction: row; left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body id="main-body">

    <div class="controls-dock">
        <div class="control-btn" title="Home" onclick="goHome()"><i class="fas fa-home"></i></div>
        <div class="control-btn" title="Full Screen" onclick="toggleFullScreen()"><i class="fas fa-expand"></i></div>
    </div>

    <div class="social-sidebar">
        <a href="https://www.facebook.com/white.cullen.3/" target="_blank" class="fab fa-facebook"></a>
        <a href="https://www.youtube.com/@TaThaiMac" target="_blank" class="fab fa-youtube"></a>
        <a href="https://www.tiktok.com/@marc_cullen?_r=1&_t=ZS-96FVrCEn0hJ" target="_blank" class="fab fa-tiktok"></a>
    </div>

    <div id="start-screen" style="position:fixed; bottom:15%; left:50%; transform:translateX(-50%);">
        <button class="btn-start" onclick="startArcade()">PRESS START</button>
    </div>

    <div class="container" id="game-container">
        <div class="arcade-card">
            <div id="view-menu">
                <h2 style="margin-bottom: 20px; color: var(--neon-pink);">SELECT GAME</h2>
                <div id="menu-list"></div>
            </div>

            <div id="view-gate" class="hidden">
                <div id="gate-icon" style="font-size: 50px; color: var(--neon-pink); margin-bottom: 10px;"></div>
                <h2 id="gate-title" style="color: var(--neon-purple); font-size: 1.5rem; margin-bottom: 10px;"></h2>
                <div id="gate-description"></div>
                <ul id="gate-bullets" class="bullet-list"></ul>
                <div class="pass-box">
                    <input type="password" id="pass-input" placeholder="ENTER HIDDEN CODE FROM VIDEO">
                    <button class="btn btn-primary" onclick="checkPassword()">UNLOCK</button>
                </div>
                <p onclick="showMenu()" style="margin-top:15px; cursor:pointer; font-weight:800; color: var(--neon-purple); text-decoration:underline;">← BACK</p>
            </div>

            <div id="view-success" class="hidden">
                <i class="fas fa-unlock-alt" style="font-size: 50px; color: var(--neon-green); margin-bottom: 15px;"></i>
                <h2 style="margin-bottom: 20px;">ACCESS GRANTED</h2>
                <div>
                    <a href="#" id="link-online" target="_blank" class="btn btn-primary">LAUNCH WEB VERSION</a>
                    <p class="note">Best for playing immediately in your browser.</p>
                </div>
                <div style="margin-top: 15px;">
                    <a href="#" id="link-zip" class="btn btn-secondary">DOWNLOAD OFFLINE (.ZIP)</a>
                    <p class="note">Download to your computer to play without internet.</p>
                </div>
                <p onclick="showMenu()" style="margin-top:20px; cursor:pointer; font-weight:800; color: var(--neon-purple); text-decoration:underline;">← LOGOUT</p>
            </div>
        </div>
    </div>

    <script>
        const gameData = {
            "game1": { 
                name: "HEAD TILT GAME", 
                icon: "fas fa-head-side-virus", 
                pass: "neckflix", 
                driveId: "1W9snHTgg18r6xXCpNem3CIZlmLbHlYNd", 
                github: "https://marccullenbrace06-commits.github.io/head-tilt-game/",
                description: "An innovative interactive game that uses computer vision for classroom engagement.",
                bullets: [
                    "Uses a camera to detect students’ head movements",
                    "Students tilt their heads left or right to select the correct answer",
                    "Fun activity that increases participation",
                    "Suitable for all subjects and grade levels",
                    "Easy to customize based on lesson objectives"
                ] 
            },
            "game2": { 
                name: "LEXICON LOTTERY", 
                icon: "fas fa-spell-check", 
                pass: "vocabzilla", 
                driveId: "1_PSKUnHRnbKbni4OP8cWeWDvLnVuQORh", 
                github: "https://marccullenbrace06-commits.github.io/lexicon-lottery/",
                description: "A fast-paced vocabulary game inspired by the classic Wheel of Fortune format.",
                bullets: [
                    "Features a spinning wheel with points and surprises",
                    "Students answer questions to earn points",
                    "Great for group activities and classroom competitions",
                    "Encourages teamwork and student engagement",
                    "Ideal for both online and face-to-face classes"
                ] 
            },
            "game3": { 
                name: "SURVEY SAYS", 
                icon: "fas fa-poll-h", 
                pass: "familyfeudyarn", 
                driveId: "1LxpLxH6e69M-_D3PoltElAc1xAkEF9V8", 
                github: "https://marccullenbrace06-commits.github.io/survey-says/",
                description: "A classroom adaptation of the popular Family Feud game show.",
                bullets: [
                    "Students guess the top common answers for a topic",
                    "Promotes critical thinking and communication skills",
                    "Excellent as an energizer or review game",
                    "Keeps students active and competitive",
                    "Flexible and easy to modify for any lesson"
                ] 
            },
            "game4": { 
                name: "WORDLE", 
                icon: "fas fa-th", 
                pass: "guessguess", 
                driveId: "1CvIngsQbH60b8CU8CNtuCv9y28DLlhsJ", 
                github: "https://marccullenbrace06-commits.github.io/wordle/",
                description: "A word guessing game where students identify the hidden word within limited tries.",
                bullets: [
                    "Color clues help students find the correct letters and positions",
                    "Builds vocabulary, spelling, and critical thinking skills",
                    "Can be played individually, in pairs, or in groups",
                    "Customizable for different subjects and lessons",
                    "Great for warm-up activities and classroom challenges"
                ] 
            }
        };

        let activeGame = "";

        function startArcade() {
            document.getElementById('main-body').classList.add('active-arcade');
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            initMenu();
        }

        function goHome() {
            document.getElementById('main-body').classList.remove('active-arcade');
            document.getElementById('start-screen').style.display = 'block';
            document.getElementById('game-container').style.display = 'none';
            showMenu();
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function initMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = "";
            for (let key in gameData) {
                list.innerHTML += `
                    <div class="game-item" onclick="showGate('${key}')">
                        <span style="font-weight:800;"><i class="${gameData[key].icon}" style="margin-right:10px; color:var(--neon-purple)"></i> ${gameData[key].name}</span>
                        <i class="fas fa-play-circle" style="opacity:0.2"></i>
                    </div>
                `;
            }
        }

        function showMenu() {
            document.getElementById('view-menu').classList.remove('hidden');
            document.getElementById('view-gate').classList.add('hidden');
            document.getElementById('view-success').classList.add('hidden');
        }

        function showGate(key) {
            activeGame = key;
            const game = gameData[key];
            document.getElementById('gate-title').innerText = game.name;
            document.getElementById('gate-description').innerText = game.description;
            document.getElementById('gate-icon').innerHTML = `<i class="${game.icon}"></i>`;
            const bullets = document.getElementById('gate-bullets');
            bullets.innerHTML = "";
            game.bullets.forEach(b => {
                const li = document.createElement('li');
                li.innerText = b;
                bullets.appendChild(li);
            });
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-gate').classList.remove('hidden');
            document.getElementById('pass-input').value = "";
        }

        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            if (input.toLowerCase() === gameData[activeGame].pass.toLowerCase()) {
                document.getElementById('view-gate').classList.add('hidden');
                document.getElementById('view-success').classList.remove('hidden');
                document.getElementById('link-online').href = gameData[activeGame].github;
                document.getElementById('link-zip').href = `https://drive.google.com/uc?export=download&id=${gameData[activeGame].driveId}`;
            } else alert("ACCESS DENIED");
        }

        initMenu();
    </script>
</body>
</html>
